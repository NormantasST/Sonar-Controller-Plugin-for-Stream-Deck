<!DOCTYPE html>
<html>

<head lang="en">
    <title>ChatMix Controller</title>
    <meta charset="utf-8" />
    <script src="https://sdpi-components.dev/releases/v4/sdpi-components.js"></script>
</head>

<body>
    <!--
        Learn more about property inspector components at https://sdpi-components.dev/docs/components
    -->
    
    <sdpi-item label="Change Value Sensitivity">
        <sdpi-range
            type="number"
            setting="changeValue"
            default="0.05"
            placeholder="Select Percentage %"
            min="0"
            max="1"
            step="0.01"
            showlabels>
            <span slot="min">0%</span>
            <span slot="max">100%</span>
        </sdpi-range>
    </sdpi-item>

</body>

</html>
