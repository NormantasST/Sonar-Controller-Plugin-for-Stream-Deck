<!DOCTYPE html>
<html>

<head lang="en">
    <title>Mute Channel Controls</title>
    <meta charset="utf-8" />
    <script src="https://sdpi-components.dev/releases/v4/sdpi-components.js"></script>
</head>

<body>
    <!--
        Learn more about property inspector components at https://sdpi-components.dev/docs/components
    -->
    <sdpi-item label="Mute Channel">
        <sdpi-select setting="targetChannel" default="classic-master" placeholder="Please Choose a Channel">
            <optgroup label="Classic">
                <option value="classic-master">Master</option>
                <option value="classic-game">Game</option>
                <option value="classic-chat">Chat</option>
                <option value="classic-media">Media</option>
                <option value="classic-aux">Aux</option>
                <option value="classic-mic">Microphone</option>
            </optgroup>
            <optgroup label="Stream">
                <option value="stream-master-personal">Master Personal</option>
                <option value="stream-master-broadcast">Master StreamMix (Broadcast)</option>
                <option value="stream-game-personal">Game Personal</option>
                <option value="stream-game-broadcast">Game StreamMix (Broadcast)</option>
                <option value="stream-chat-personal">Chat Personal</option>
                <option value="stream-chat-broadcast">Chat StreamMix (Broadcast)</option>
                <option value="stream-media-personal">Media Personal</option>
                <option value="stream-media-broadcast">Media StreamMix (Broadcast)</option>
                <option value="stream-aux-personal">Aux Personal</option>
                <option value="stream-aux-broadcast">Aux StreamMix (Broadcast)</option>
                <option value="stream-mic-personal">Microphone Personal</option>
                <option value="stream-mic-broadcast">Microphone StreamMix (Broadcast)</option>
            </optgroup>
        </sdpi-select>
    </sdpi-item>

    <sdpi-item label="Auto Text">
        <sdpi-checkbox-list setting="showTextComponents" columns="1">
            <option value="channel" selected>Channel</option>
            <option value="status" selected>Status</option>
        </sdpi-checkbox-list>
    </sdpi-item>

    <div style="text-align: center; display: inline; font-size: smaller">
        <p style="color: lightgray">
            Donate to this Free Project on
            <a style="color: lightblue;" target="_blank" href="https://www.paypal.com/donate/?hosted_button_id=M7YRNV44SUZV6">PayPal</a>
        </p>
    </div>

</body>

</html>
